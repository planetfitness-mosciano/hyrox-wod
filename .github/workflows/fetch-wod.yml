name: Fetch WOD

on:
  schedule:
    # 02:50 UTC = 04:50 ora italiana (CET, UTC+2 in estate)
    - cron: '50 2 * * *'
  workflow_dispatch: {}   # permette di avviarlo manualmente da GitHub

jobs:
  update-wod:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Fetch WOD and generate index.html
        env:
          HYROX_EMAIL:    ${{ secrets.HYROX_EMAIL }}
          HYROX_PASSWORD: ${{ secrets.HYROX_PASSWORD }}
        run: node fetch-wod.js

      - name: Commit and push index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Commit solo se c'è qualcosa da committare
          git diff --cached --quiet && echo "Nessuna modifica." || \
            git commit -m "chore: WOD automatico $(date -u +'%Y-%m-%d')"
          git push
