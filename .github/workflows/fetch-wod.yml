name: Fetch WOD

on:
  schedule:
    # Minuto 17 e non 0: i job al minuto 0 sono i più ritardati/scartati da GitHub
    - cron: '17 3 * * *'   # 05:17 IT (estate) — WOD del giorno
    - cron: '47 4 * * *'   # 06:47 IT — recupero se il primo salta
    - cron: '17 7 * * *'   # 09:17 IT
    - cron: '17 10 * * *'  # 12:17 IT
    - cron: '17 13 * * *'  # 15:17 IT
    - cron: '17 16 * * *'  # 18:17 IT
    - cron: '17 18 * * *'  # 20:17 IT
  workflow_dispatch: {}

jobs:
  update-wod:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download hls.min.js if not present
        run: |
          if [ ! -f hls.min.js ]; then
            curl -sL "https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.15/hls.min.js" -o hls.min.js
          fi

      - name: Install dependencies
        run: npm install

      - name: Install Chromium for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Install ffmpeg (ricodifica video)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Fetch WOD and generate index.html + timer.html
        env:
          HYROX_EMAIL:    ${{ secrets.HYROX_EMAIL }}
          HYROX_PASSWORD: ${{ secrets.HYROX_PASSWORD }}
        run: node fetch-wod.js

      - name: Upload debug screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug-login.png
          if-no-files-found: ignore

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p videos m
          git add -A index.html timer.html debug-exercise-fields.txt hls.min.js videos m
          git diff --cached --quiet && echo "Nessuna modifica." || \
            git commit -m "chore: WOD aggiornato $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
