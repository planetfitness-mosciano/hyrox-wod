// Cache locale dei video (blob in RAM): cambi esercizio istantanei, zero rete
const videoCache = {};

const globalFlat = [];
WORKOUT.forEach(function(b){ b.exercises.forEach(function(ex){ globalFlat.push(ex); }); });
let globalExIdx = 0;

function pad(n){ return String(n).padStart(2,'0'); }
function fmtTime(s){ return pad(Math.floor(s/60))+':'+pad(s%60); }

function loadVideo(url, fallbackUrl) {
  const vid = document.getElementById('ex-video');
  const msg = document.getElementById('loading-msg');
  if (!url && !fallbackUrl) {
    if(window._hls){window._hls.destroy();window._hls=null;}
    vid.removeAttribute('data-cur'); vid.src=''; msg.style.display='flex'; return;
  }
  const primary = url || fallbackUrl;
  const backup  = (url && fallbackUrl && url!==fallbackUrl) ? fallbackUrl : null;
  if (vid.getAttribute('data-cur')===primary) return;
  vid.setAttribute('data-cur', primary);
  msg.style.display='none';
  function isHls(s){ return typeof s==='string' && s.indexOf('.m3u8')!==-1; }
  function tryPlay(src, nextSrc) {
    if (isHls(src) && typeof Hls!=='undefined' && Hls.isSupported()) {
      if(window._hls){ window._hls.destroy(); window._hls=null; }
      const h=new Hls({autoStartLoad:true,enableWorker:false});
      h.loadSource(src); h.attachMedia(vid);
      h.on(Hls.Events.MANIFEST_PARSED,function(){ if(!paused) vid.play().catch(function(){}); });
      h.on(Hls.Events.ERROR,function(e,d){
        if(d.fatal){ h.destroy(); window._hls=null;
          if(nextSrc){ tryPlay(nextSrc,null); }
          else { vid.src=src; vid.load(); if(!paused) vid.play().catch(function(){}); }
        }
      });
      window._hls=h;
    } else {
      if(window._hls){ window._hls.destroy(); window._hls=null; }
      vid.src=videoCache[src]||src; vid.load(); if(!paused) vid.play().catch(function(){});
      vid.onerror=function(){ if(nextSrc){ vid.onerror=null; tryPlay(nextSrc,null); } };
    }
  }
  tryPlay(primary, backup);
}

function setTopbar(block){
  document.getElementById('tb-name').textContent=block.sectionName;
  document.getElementById('tb-fmt').textContent=block.fmt||'';
}

function showAmrap(block) {
  document.getElementById('ui-amrap').style.display='flex';
  document.getElementById('ui-interval').style.display='none';
  setTopbar(block);
  let lbl;
  if(block.type==='EMOM') {
    lbl = (block.fmt||'EMOM')+' \u00b7 MINUTO '+roundNum+' / '+block.totalRounds;
  } else if(block.type==='CIRCUIT') {
    lbl = 'ROUND '+roundNum+' / '+block.totalRounds+' \u00b7 TEMPO RIMASTO';
  } else if(block.type==='FOR_TIME') {
    lbl = block.timeCap>0 ? 'FOR TIME \u00b7 LIMITE '+fmtTime(block.timeCap) : 'FOR TIME \u00b7 TEMPO TRASCORSO';
  } else {
    lbl = 'AMRAP \u00b7 TEMPO RIMASTO';
  }
  document.getElementById('amrap-label').textContent=lbl;
  const list=document.getElementById('amrap-list');
  list.innerHTML=block.exercises.map(function(ex,i){
    const meta=[(ex.reps||''),(ex.weight||'')].filter(Boolean).join(' \u00b7 ');
    return '<div class="amrap-ex'+(i===0?' active':'')+'" id="amr-'+i+'">'+
      '<span class="amrap-ex-name">'+ex.name.toUpperCase()+'</span>'+
      '<span class="amrap-ex-reps">'+meta+'</span></div>';
  }).join('');
  if(block.exercises[0]) loadVideo(block.exercises[0].videoUrl, block.exercises[0].videoUrlPermanent);
  updateAmrapTimer(block);
}

function updateAmrapTimer(block) {
  document.getElementById('amrap-countdown').textContent=fmtTime(secs);
  const elapsed = block.totalTime - secs;
  const cycleLen = 10;
  if(!block.exercises.length) return;
  const newIdx = Math.floor(elapsed / cycleLen) % block.exercises.length;
  if (newIdx !== amrapCycleIdx) {
    const oldEl=document.getElementById('amr-'+amrapCycleIdx);
    if(oldEl) oldEl.classList.remove('active');
    amrapCycleIdx=newIdx;
    const newEl=document.getElementById('amr-'+amrapCycleIdx);
    if(newEl) newEl.classList.add('active');
    const ex=block.exercises[amrapCycleIdx];
    if(ex && (ex.videoUrl||ex.videoUrlPermanent)) loadVideo(ex.videoUrl, ex.videoUrlPermanent);
  }
}

function showInterval(block) {
  document.getElementById('ui-amrap').style.display='none';
  document.getElementById('ui-interval').style.display='flex';
  setTopbar(block);
  updateIntervalDisplay(block);
}

function curStationFirstName(block){
  if(block.type==='INTERVAL' && block.steps){ const st=block.steps[exIdx % block.steps.length]; return (st&&st.exercises[0])?st.exercises[0].name:''; }
  const ex=block.exercises[exIdx]; return ex?ex.name:'';
}
// INTERVAL = rotazione a stazioni: mostra TUTTI gli esercizi della stazione (reps/RPE/peso).
// Se la stazione ha più esercizi, il video CICLA tra loro (~8s ciascuno) evidenziando l'attivo.
let _intKey=null, _intCyc=-1;
function renderInterval(block){
  const isWork=(state==='WORK');
  const n=block.steps.length;
  const stIdx = isWork ? (exIdx % n) : ((exIdx+1) % n);
  const st = block.steps[stIdx];
  if(!st) return;
  const key = stIdx+'|'+(isWork?'W':'R');
  const exEl=document.getElementById('int-exname');
  if(_intKey!==key){
    _intKey=key; _intCyc=-1;
    const nb=document.getElementById('int-next-badge'); if(nb) nb.style.display=isWork?'none':'inline-block';
    document.getElementById('int-pos').textContent='INTERVALLO '+(exIdx+1)+' / '+block.intervals;
    exEl.classList.toggle('multi', st.exercises.length>1);
    exEl.innerHTML = st.exercises.map(function(e,i){
      const meta=[(e.metric && e.metric!=='\u2014')?e.metric:'', e.rpe?('RPE '+e.rpe):'', e.weight||''].filter(Boolean).join(' \u00b7 ');
      return '<div class="ivx" id="ivx-'+i+'"><div class="ivx-n">'+e.name.toUpperCase()+'</div>'+(meta?'<div class="ivx-m">'+meta+'</div>':'')+'</div>';
    }).join('');
    const iw=document.getElementById('int-weight'); if(iw) iw.style.display='none';
  }
  document.getElementById('int-label').textContent=isWork?'LAVORO':'RIPOSO';
  document.getElementById('int-timer').textContent=fmtTime(secs);
  document.getElementById('int-round').textContent='ROUND '+(exIdx+1)+' / '+block.intervals;
  // ciclo video tra gli esercizi della stazione (solo in WORK e se multi)
  let cyc=0;
  if(isWork && st.exercises.length>1){
    const elapsed=block.workTime-secs;
    cyc=Math.floor(elapsed/8) % st.exercises.length;
  }
  if(_intCyc!==cyc){
    _intCyc=cyc;
    if(st.exercises.length>1){
      for(let i=0;i<st.exercises.length;i++){ const el=document.getElementById('ivx-'+i); if(el) el.classList.toggle('active', i===cyc); }
    }
    const fe=st.exercises[cyc]||st.exercises[0];
    if(fe && (fe.videoUrl||fe.videoUrlPermanent)) loadVideo(fe.videoUrl, fe.videoUrlPermanent);
  }
}
function updateIntervalDisplay(block) {
  if(block.type==='INTERVAL' && block.steps){ renderInterval(block); return; }
  // ── TABATA: singolo esercizio per stazione ──
  const isWork  = (state === 'WORK');
  const curEx   = block.exercises[exIdx];
  let nextIdx = exIdx + 1;
  if (nextIdx >= block.exercises.length) nextIdx = 0;
  const showEx = isWork ? curEx : block.exercises[nextIdx];
  if(!showEx) return;
  const nextBadge = document.getElementById('int-next-badge');
  if (nextBadge) nextBadge.style.display = isWork ? 'none' : 'inline-block';
  document.getElementById('int-pos').textContent=(globalExIdx+1)+' / '+globalFlat.length;
  const exEl=document.getElementById('int-exname'); exEl.classList.remove('multi'); exEl.textContent=showEx.name.toUpperCase();
  const iw=document.getElementById('int-weight'); if(iw){ iw.textContent=showEx.weight?('PESO '+showEx.weight):''; iw.style.display=showEx.weight?'block':'none'; }
  document.getElementById('int-label').textContent=isWork ? 'LAVORO' : 'RIPOSO';
  document.getElementById('int-timer').textContent=fmtTime(secs);
  document.getElementById('int-round').textContent='ROUND '+exerciseRound+' / '+block.roundsPerExercise;
  if (showEx.videoUrl || showEx.videoUrlPermanent) loadVideo(showEx.videoUrl, showEx.videoUrlPermanent);
}

function showDone() {
  document.getElementById('ui-ready').style.display='none';
  document.getElementById('tb-name').textContent='ALLENAMENTO COMPLETATO';
  document.getElementById('tb-fmt').textContent='';
  document.getElementById('ui-interval').style.display='none';
  document.getElementById('ui-amrap').style.display='flex';
  document.getElementById('amrap-label').textContent='GRANDE LAVORO!';
  document.getElementById('amrap-countdown').textContent='00:00';
  document.getElementById('amrap-list').innerHTML='';
  loadVideo('');
}

// initBlock = schermata "PRONTI" (in pausa) con la lista attrezzi della sezione.
// Il timer parte solo quando l'utente preme INIZIA → beginBlock().
function initBlock() {
  const block=WORKOUT[blockIdx];
  if(!block){ showDone(); return; }
  state='READY';
  showReady(block);
  markCurrent();
}
function showReady(block){
  setTopbar(block);
  document.getElementById('ready-badge').textContent=String(blockIdx+1).padStart(2,'0');
  document.getElementById('ready-name').textContent=block.sectionName;
  document.getElementById('ready-schema').textContent=block.sectionSchema||'';
  const eq=(block.equipment&&block.equipment.length)?block.equipment:[];
  const list=document.getElementById('ready-equip');
  const items = eq.length
    ? eq.map(function(e){ return '<div class="ready-eq">'+e+'</div>'; }).join('')
    : '<div class="ready-eq ready-eq-none">A corpo libero</div>';
  list.innerHTML='<div class="ready-eq-hd">Attrezzi necessari</div>'+items;
  document.getElementById('ui-ready').style.display='flex';
  loadVideo('');
}
// beginBlock = avvio reale della sezione (ex initBlock)
function beginBlock() {
  const block=WORKOUT[blockIdx];
  if(!block){ showDone(); return; }
  document.getElementById('ui-ready').style.display='none';
  exIdx=0; roundNum=1; amrapCycleIdx=0; exerciseRound=1; _intKey=null;
  if(block.type==='AMRAP'||block.type==='CIRCUIT'||block.type==='EMOM') {
    state='AMRAP'; secs=block.totalTime;
    showAmrap(block);
  } else if(block.type==='FOR_TIME') {
    state='AMRAP';
    secs = block.timeCap > 0 ? block.timeCap : 0;
    showAmrap(block);
  } else if(block.type==='TABATA') {
    state='WORK'; secs=block.workTime;
    showInterval(block);
    const il=document.getElementById('int-label'); if(il) il.textContent='TABATA';
    const ir=document.getElementById('int-round'); if(ir) ir.textContent='ROUND 1 / '+block.roundsPerExercise;
  } else {
    state='WORK'; secs=block.workTime;
    showInterval(block);
  }
  markCurrent();
}

function tickCore() {
  const block=WORKOUT[blockIdx];
  if(!block) return;
  if(secs>0 || block.type==='FOR_TIME') {
    if(block.type==='FOR_TIME' && block.timeCap===0) { secs++; updateAmrapTimer(block); return; }
    if(secs<=0) { /* FOR TIME con cap arriva qui alla fine */ }
    else secs--;
    if(block.type==='AMRAP'||block.type==='CIRCUIT'||block.type==='EMOM'||block.type==='FOR_TIME') {
      if(state==='AMRAP') updateAmrapTimer(block);
      else {
        { const el=document.getElementById('amrap-label'); if(el) el.textContent=(block.type==='EMOM'?((block.fmt||'EMOM')+' \u00b7 MINUTO'):'RIPOSO \u00b7 ROUND')+' '+roundNum+' / '+block.totalRounds+(block.type!=='EMOM'?' \u00b7 TEMPO RIMASTO':''); }
        document.getElementById('amrap-countdown').textContent=fmtTime(secs);
      }
    } else if(block.type==='TABATA') { updateIntervalDisplay(block); }
    else { updateIntervalDisplay(block); }
    if(secs>0 || (block.type==='FOR_TIME'&&block.timeCap===0)) return;
  }
  if(block.type==='AMRAP') {
    blockIdx++; globalExIdx+=block.exercises.length;
    if(blockIdx<WORKOUT.length) initBlock(); else showDone();
    return;
  }
  if(block.type==='CIRCUIT'||block.type==='EMOM') {
    if(state==='AMRAP') {
      if(block.restTime>0 && roundNum<block.totalRounds) {
        state='REST'; secs=block.restTime;
        { const el=document.getElementById('amrap-label'); if(el) el.textContent=(block.type==='EMOM'?'EMOM \u00b7 MINUTO':'RIPOSO \u00b7 ROUND')+' '+roundNum+' / '+block.totalRounds+(block.type!=='EMOM'?' \u00b7 TEMPO RIMASTO':''); }
        document.getElementById('amrap-countdown').textContent=fmtTime(secs);
        loadVideo('');
      } else if(roundNum<block.totalRounds) {
        roundNum++; state='AMRAP'; secs=block.totalTime; amrapCycleIdx=0;
        showAmrap(block);
      } else {
        blockIdx++; globalExIdx+=block.exercises.length;
        if(blockIdx<WORKOUT.length) initBlock(); else showDone();
      }
    } else {
      roundNum++; state='AMRAP'; secs=block.totalTime; amrapCycleIdx=0;
      showAmrap(block);
    }
    return;
  }
  if(block.type==='TABATA') {
    if(state==='WORK') {
      state='REST'; secs=block.restTime;
      const il=document.getElementById('int-label'); if(il) il.textContent='RIPOSO';
      document.getElementById('int-timer').textContent=fmtTime(secs);
    } else {
      exerciseRound++;
      if(exerciseRound>block.roundsPerExercise) {
        exerciseRound=1; exIdx++; globalExIdx++;
        if(exIdx>=block.exercises.length) {
          blockIdx++; if(blockIdx<WORKOUT.length) initBlock(); else showDone(); return;
        }
      }
      state='WORK'; secs=block.workTime;
      showInterval(block);
      const il=document.getElementById('int-label'); if(il) il.textContent='TABATA';
      const ir=document.getElementById('int-round'); if(ir) ir.textContent='ROUND '+exerciseRound+' / '+block.roundsPerExercise;
      loadVideo(block.exercises[exIdx].videoUrl, block.exercises[exIdx].videoUrlPermanent);
    }
    return;
  }
  // INTERVAL: exIdx = indice intervallo (0-based); fine a block.intervals
  if(state==='WORK' && block.restTime>0) {
    state='REST'; secs=block.restTime; updateIntervalDisplay(block);
  } else {
    exIdx++; globalExIdx++;
    const tot=block.intervals||(block.steps?block.steps.length:block.exercises.length);
    if(exIdx>=tot) {
      blockIdx++;
      if(blockIdx<WORKOUT.length) initBlock(); else showDone();
      return;
    }
    state='WORK'; secs=block.workTime;
    updateIntervalDisplay(block);  // carica già il video della stazione corrente
  }
}

// ── Audio: beep come file audio HTML (non Web Audio).
// Su iPhone l'interruttore fisico del silenzioso ammutolisce la Web Audio API,
// ma NON i media: riproducendo i beep via <audio> si sentono anche col silenzioso.
let soundOn=true, _primed=false;
const _audio={};
function mkBeep(b64){ const a=new Audio('data:audio/wav;base64,'+b64); a.preload='auto'; return a; }
function ensureAudio(){
  try{
    if(!_audio.cd){ _audio.cd=mkBeep(BEEP_CD_B64); _audio.rest=mkBeep(BEEP_REST_B64); _audio.work=mkBeep(BEEP_WORK_B64); }
    if(_primed) return;
    _primed=true;
    // "Sblocco" autoplay iOS: play+pause muto di ciascun elemento dentro il gesto utente
    Object.keys(_audio).forEach(function(k){
      const a=_audio[k];
      try{
        a.volume=0;
        const p=a.play();
        const done=function(){ try{ a.pause(); a.currentTime=0; a.volume=1; }catch(e){} };
        if(p&&p.then) p.then(done).catch(function(){ a.volume=1; }); else done();
      }catch(e){}
    });
  }catch(e){}
}
function playBeep(key){
  if(!soundOn) return;
  const a=_audio[key]; if(!a) return;
  try{ a.currentTime=0; const p=a.play(); if(p&&p.catch) p.catch(function(){}); }catch(e){}
}
function beepCountdown(){ playBeep('cd'); }    // 3-2-1
function beepWork(){ playBeep('work'); }       // doppio acuto: VIA
function beepRest(){ playBeep('rest'); }       // grave: stop/riposo

// ── Voce (Web Speech API): annuncia esercizio / riposo / sezione ──
// Nomi esercizio in voce inglese (sono in inglese), 'riposo'/sezioni in italiano.
let voiceOn=true;
function pickVoice(prefix){
  try{ const vs=speechSynthesis.getVoices()||[]; return vs.find(v=>v.lang&&v.lang.toLowerCase().indexOf(prefix)===0)||null; }catch(e){ return null; }
}
function speak(text, lang){
  if(!voiceOn || !('speechSynthesis' in window) || !text) return;
  try{
    const u=new SpeechSynthesisUtterance(text);
    u.lang = (lang==='en') ? 'en-US' : 'it-IT';
    const v=pickVoice(lang==='en'?'en':'it'); if(v) u.voice=v;
    u.rate=1.0; u.volume=1.0;
    speechSynthesis.speak(u);
  }catch(e){}
}
function announceTransition(preBlock){
  if(!voiceOn) return;
  const block=WORKOUT[blockIdx];
  if(!block){ speak('Allenamento completato','it'); return; }
  if(blockIdx!==preBlock) speak(block.sectionName,'it');      // nuova sezione
  if(state==='REST'){ speak('riposo','it'); return; }
  if(block.type==='INTERVAL'||block.type==='TABATA'){          // fase a esercizio/stazione
    const nm=curStationFirstName(block);
    if(nm) speak(nm,'en');
  }
}

// tick = wrapper di tickCore: rileva i cambi di fase, suona i beep e annuncia
function tick(){
  if(paused || state==='READY') return;   // in 'PRONTI' il timer è fermo finché non si preme INIZIA
  const preBlock = blockIdx;
  const pre = state+'|'+blockIdx+'|'+exIdx+'|'+roundNum+'|'+exerciseRound;
  tickCore();
  const post = state+'|'+blockIdx+'|'+exIdx+'|'+roundNum+'|'+exerciseRound;
  if(pre!==post){
    if(blockIdx>=WORKOUT.length || state==='REST'){ beepRest(); }
    else { beepWork(); }
    announceTransition(preBlock);
  } else if(secs>0 && secs<=3){
    const b=WORKOUT[blockIdx];
    if(b && !(b.type==='FOR_TIME' && b.timeCap===0)) beepCountdown();
  }
}

// Tasto INIZIA della schermata "PRONTI": avvia la sezione (col gesto si sblocca l'audio)
document.getElementById('ready-play').addEventListener('click',function(){
  ensureAudio();
  beginBlock();
  beepWork();
  const b=WORKOUT[blockIdx];
  if(b){ if(b.type==='INTERVAL'||b.type==='TABATA'){ const nm=curStationFirstName(b); if(nm) speak(nm,'en'); } else { speak(b.sectionName,'it'); } }
});

// Voce e beep restano ATTIVI di default (si silenziano col volume del telefono).
// I pulsanti voce/audio/fullscreen sono stati rimossi: in topbar resta solo pause/play.
// Su Android il fullscreen scatta comunque al primo tocco (onFirstGesture, sotto).

// Primo tocco ovunque: sblocca l'audio e prova il fullscreen automatico
let firstGesture=false;
function onFirstGesture(){
  ensureAudio();
  if(!firstGesture){
    firstGesture=true;
    const d=document.documentElement;
    try{ if(d.requestFullscreen){ const p=d.requestFullscreen(); if(p&&p.catch) p.catch(function(){}); } }catch(e){}
    // il gesto utente è il momento più affidabile per wake lock e nosleep
    acquireWake();
    if(noSleepVid) noSleepVid.play().catch(function(){});
    // annuncia subito l'esercizio/sezione corrente (la voce si sblocca col gesto)
    try{
      const b=WORKOUT[blockIdx];
      if(b){ if(b.type==='INTERVAL'||b.type==='TABATA'){ const nm=curStationFirstName(b); if(nm) speak(nm,'en'); } else { speak(b.sectionName,'it'); } }
    }catch(e){}
  }
}
document.addEventListener('click',onFirstGesture,true);
document.addEventListener('touchend',onFirstGesture,true);

// ── Menu sezioni (drawer) ──
const drawer=document.getElementById('drawer');
const backdrop=document.getElementById('drawer-backdrop');
function openDrawer(){ drawer.classList.add('open'); backdrop.classList.add('open'); markCurrent(); }

function markCurrent(){
  const items=document.querySelectorAll('.drawer-item');

}

  const wrap=document.getElementById('drawer-items');

function jumpTo(i){
  if(i<0||i>=WORKOUT.length) return;

  closeDrawer();
}

// ── Prefetch in background di tutti i video del giorno ──
// Scarica i video uno alla volta e li tiene in RAM come blob: i cambi
// esercizio diventano istantanei e il workout non dipende più dalla rete.
(function(){
  const seen={}, urls=[];
  WORKOUT.forEach(function(b){ b.exercises.forEach(function(ex){
    const u=ex.videoUrl||ex.videoUrlPermanent;
    if(u && u.indexOf('.m3u8')===-1 && !seen[u]){ seen[u]=1; urls.push(u); }
  }); });
  let i=0;
  function next(){
    if(i>=urls.length){ return; }
    const u=urls[i++];
    if(videoCache[u]){ next(); return; }
    fetch(u).then(function(r){ if(!r.ok) throw new Error('http '+r.status); return r.blob(); })
      .then(function(b){ try{ videoCache[u]=URL.createObjectURL(b); }catch(e){} next(); })
      .catch(function(){ setTimeout(next, 800); });
  }
  setTimeout(next, 1200); // lascia partire il primo video, poi scarica il resto
})();

// ── Wake Lock: tieni lo schermo acceso durante il workout ──
let wakeLock=null;
function acquireWake(){
  if('wakeLock' in navigator){
    navigator.wakeLock.request('screen').then(function(wl){
      wakeLock=wl;
      // se il sistema lo rilascia (es. cambio app), riprova
      wl.addEventListener('release',function(){ setTimeout(acquireWake,1000); });
    }).catch(function(){ startNoSleep(); });
  } else {
    startNoSleep();
  }
}
